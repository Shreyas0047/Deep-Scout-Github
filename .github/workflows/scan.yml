name: CI

on:
  push:
    branches: [main, master, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy deep_scout/

      - name: Test with pytest
        run: pytest tests/ -v --cov=deep_scout --cov-report=term-missing

  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Deep-Scout
        run: pip install .

      - name: Run Deep-Scout Scan
        id: scan
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          deep-scout scan \
            --org ${{ github.repository_owner }} \
            --repo ${{ github.event.repository.name }} \
            --format json \
            --output deep-scout-results.json \
            --fail-on-secret

      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deep-scout-report
          path: |
            deep-scout-results.json
            deep-scout-report-*.html

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, secret-scan]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
